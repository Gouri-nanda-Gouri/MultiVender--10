{% extends 'Admin/Header.html' %}
{% block content %}

<div class="container-fluid pt-4 px-4">

```
<!-- Add Category Form -->
<div class="bg-secondary rounded h-100 p-4 mb-4">
    <h6 class="mb-4">Add Category</h6>

    <form method="post">
        {% csrf_token %}

        <div class="row">
            <div class="col-md-10">
                <input type="text"
                       class="form-control"
                       name="txt_nme"
                       placeholder="Enter Category Name"
                       value="{{editData.category_name}}"
                       required>
            </div>

            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">
                    Add
                </button>
            </div>
        </div>

    </form>
</div>


<!-- Category List -->
<div class="bg-secondary rounded h-100 p-4">
    <h6 class="mb-4">Category List</h6>

    <div class="table-responsive">
        <table class="table table-bordered table-hover">

            <thead>
                <tr>
                    <th>SL NO</th>
                    <th>Category</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
            {% for i in Category %}
                <tr>
                    <td>{{forloop.counter}}</td>
                    <td>{{i.category_name}}</td>
                    <td>

                        <a href="{% url 'Admin:editcategory' i.id %}"
                           class="btn btn-warning btn-sm">
                           Edit
                        </a>

                        <a href="{% url 'Admin:delcategory' i.id %}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this category?')">
                           Delete
                        </a>

                    </td>
                </tr>
            {% endfor %}
            </tbody>

        </table>
    </div>

</div>
```

</div>

{% if update %}

<script>
alert("{{update}}")
window.location="{% url 'Admin:Category' %}"
</script>

{% endif %}

{% endblock %}
