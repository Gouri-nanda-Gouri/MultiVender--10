<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="post">
    {% csrf_token %}
    <table border="3">
        <tr>
            <td>Name</td>
            <td><input type="text" name="txt_name" id="txt_name" value="{{editData.admin_name}}"></td>
        </tr>
        <tr>
            <td>Email</td>
            <td><input type="text" name="txt_email" id="txt_email" value="{{editData.admin_email}}"></td>
        </tr>
        <tr>
            <td>password</td>
            <td><input type="password" name="txt_pass" id="txt_pass" value="{{editData.admin_password}}"></td>
        </tr>
        <tr>
            <td colspan="2" align="center"><input type="submit" value="submit"></td>
           
        </tr>
    </table>
    <table border="4"><tr>
        <td>SLNO</td>
        <td>Name</td>
        <td>Email</td>
        <td>password</td>
        <td>Action</td>
    </tr>
    {% for i in Registration %}
    <tr>
        <td>{{forloop.counter}}</td>
        <td>{{i.admin_name}}</td>
        <td>{{i.admin_email}}</td>
        <td>{{i.admin_password}}</td>
        <td><a href="{% url 'Admin:delRegistration' i.id %}">Delete</a>
            
        </td><a href="{% url 'Admin:editRegistration' i.id %}">Edit</a>
    </tr>
    {% endfor %}
    </table> 
    </form>
</body>
</html>
{% if msg %}
 <script>
    alert("{{msg}}")
    window.location="{% url 'Admin:Registration' %}"
 </script>
 {% endif %}
