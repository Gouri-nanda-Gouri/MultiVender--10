<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="post">
        {% csrf_token %}
    <table>
        <tr>
            <td>Category</td>
            <td><select name="sel_category" id="">
            <option value="">....category....</option>
            {% for i in CategoryData %}
            <option
            {% if i.id == editData.category.id %}
            
            selected
            
            {% endif %}
            value="{{i.id}}">{{i.category_name}}</option>
            {% endfor %}
            </select>   </td>
        </tr>
        <tr>
            <td>Subcategory</td>
            <td><input type="text" name="txt_name" value="{{editData.subcategory_name}}"></td>
        </tr>
        <tr>
            <td colspan="2" align="center"><input type="submit" value="submit"></td>
            <td></td>
        </tr>
    </table>
    <table border="4"> <tr>
        <td>SLNO</td>
        <td>Category</td>
        <td>Subcategory</td>
        <td>Action</td>
    </tr>
    {% for i in subCategoryData %}
    <tr>
        <td>{{forloop.counter}}</td>
        <td>{{i.category.category_name}}</td>
        <td>{{i.subcategory_name}}</td>
        <td>
            <a href="{% url 'Admin:delSubcategory' i.id %}">Delete</a>
            <a href="{% url 'Admin:editSubcategory' i.id %}">Edit</a>
        </td>
    </tr>
     {% endfor %}
    </form>
    </table>
</body>
</html>
{% if msg %}
 <script>
    alert("{{msg}}")
    window.location="{% url 'Admin:Subcategory' %}"
 </script>
{% endif %}
