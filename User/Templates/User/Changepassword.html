<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <form action="" method="post">
        {% csrf_token %}
    <table border="2">
     <tr>
        <td>Old password</td>
        <td><input type="text" name="password" placeholder="enter old password"></td>
    </tr>
    <tr>
        <td>New password</td>
        <td><input type="text" name="newpass" placeholder="enter new password"></td>
    </tr>
    <tr>
        <td>Re-type password</td>
        <td><input type="text" name="re_pass" placeholder="enter re-pass"></td>
    </tr>
    <tr>
        <td colspan="2" align="center"><input type="submit" value="changepassword">
        <input type="reset" value="cancel">
        </td>

    </tr>
</form>
    </table>
</body>
</html>
{% if msg %}
 <script>
    alert("{{msg}}")
    window.location="{% url 'User:MyProfile' %}"
 </script>
{% endif %}
