{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Gallery</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: black;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Title */
        h2 {
            color: white;
            font-size: 50px;
            text-align: center;
            margin-top: 40px;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 80%;
            margin: auto;
            margin-top: 40px;
        }

        /* Image Style */
        .gallery img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 5px;
            transition: 0.3s;
        }

        /* Hover Effect */
        .gallery img:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <h2>Product Gallery</h2>

    <div class="gallery">

        {% for i in data %}

        <img src="{{ i.gallery_file.url }}" alt="Gallery Image">

        {% endfor %}

    </div>
