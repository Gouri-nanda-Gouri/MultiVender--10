<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <form action="" method="post">
        {% csrf_token %}
    <table border="2">
        <tr>
            <td>Content</td>
            <td><input type="text" name="txt_content"></td>
        </tr>
        <tr>
            <td colspan="2" align="center"><input type="submit" value="submit"></td>
        </tr>
        <br>
     <table border="2">
        <tr>
            <td>SLNO</td>
            <td>Content</td>
            <td>Action</td>
        </tr>
          {% for i in feedbackdata %}
        <tr>
            <td>{{forloop.counter}}</td>
            <td>{{i.feedback_content}}</td>
            <td>
                <a href="{% url 'User:delfeedback' i.id %}">Delete</a>
            </td>
        </tr>
        {% endfor %}
</body>
</html>
{% if msg %}
 <script>
    alert("{{msg}}")
    window.location="{% url 'User:feedback' %}"
 </script>
{% endif %}
