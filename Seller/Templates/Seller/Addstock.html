<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <form action="" method="post">
        {% csrf_token %}
    <table border="2">
    <tr>
        <td>Count</td>
        <td><input type="text" name="count_stock"></td>
    </tr>
    <tr>
        <td colspan="2" align="center"><input type="submit" value="submit"></td>
        <td></td>
    </tr>
</form>
    </table>
    <br>
    <table border="2">
        <tr>
            <td>SLNO</td>
            <td>COUNT</td>
            <td>ACTION</td>
        </tr>
         {% for i in stockdata %}
       <tr>
        <td>{{forloop.counter}}</td>
        <td>{{ i.stock_count }}</td>
        <td><a href="{% url 'Seller:Delstock' i.id stk %}">Delete</a></td>
        <td></td>
      </tr>
       {% endfor %}
    </table>
</body>
</html>
{% if msg %}
 <script>
    alert("{{msg}}")
    window.location="{% url 'Seller:Addstock' stk %}"
 </script>
{% endif %}
