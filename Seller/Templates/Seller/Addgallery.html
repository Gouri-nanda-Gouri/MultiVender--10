<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <form action="" method="post" enctype="multipart/form-data">
        {% csrf_token %}
    <table border="2">
     <tr>
        <td>FILE</td>
        <td><input type="file" name="file_name" ></td>
    </tr>
    <tr>
        <td colspan="2" align="center"><input type="submit" value="submit"></td>
    </tr>
    <br>
     <table border="2">
        <tr>
            <td>SLNO</td>
            <td>FILE</td>
            <td>ACTION</td>
        </tr>
         {% for i in gallerydata %}
       <tr>
        <td>{{forloop.counter}}</td>
        <td><img src="{{i.gallery_file.url}}" width="100px" alt=""></td>
        <td><a href="{% url 'Seller:Delgallery' i.id gall %}">Delete</a></td>
      </tr>
       {% endfor %}
</body> 
</html>
{% if msg %}
 <script>
    alert("{{msg}}")
    window.location="{% url 'Seller:Addgallery' gall %}"
 </script>
{% endif %}
