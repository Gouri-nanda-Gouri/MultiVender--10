<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <form action="" method="post" enctype="multipart/form-data">
        {% csrf_token %}
    <table border="2">
     <tr>
        <td>Name</td>
        <td><input type="text" name="txt_name"></td>
    </tr>
    <tr>
        <td>Email</td>
        <td><input type="text" name="txt_email"></td>
    </tr>
    <tr>
        <td>Contact</td>
        <td><input type="text" name="txt_no"></td>
    </tr>
    <tr>
        <td>Address</td>
        <td><textarea name="txtaddress" rows="2" cols="16"></textarea></td>
    </tr>
    <tr>
        <td>Photo</td>
        <td><input type="file" name="choosefile"></td>
    </tr>
    <tr>
        <td>Proof</td>
        <td><input type="file" name="enter_proof"></td>
    </tr>
    <tr>
        <td>Password</td>
        <td><input type="text" name="password" placeholder="password"></td>
    </tr>
    <tr>
        <td>District</td>
        <td>                    <select name="sel_district" id="sel_district">
                        <option value="">------selection---</option>

                        {% for i in dis %}
                        <option value="{{i.id}}">{{i.district_name}}</option>

                        {% endfor %}
                    </select></td>
    </tr>
    <tr>
        <td>place</td>
        <td><select name="sel_place" id="sel_place">
                        <option value="">------selection---</option>
                       
                    </select></td>
    </tr>
    <tr>
        <td colspan="2" align="center"><input type="submit" name="submit" value="submit"></td>
    </tr>
    </table>
</form>
    
</body>
</html>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    $("#sel_district").change(function () {
        var did = $(this).val();
        
        var ur = "{% url 'Guest:ajaxplace' %}"
        $.ajax({
            url: ur,
            data: { did: did, },
            success: function (data) {
                $("#sel_place").html(data);
            },
        });
    });
</script>
{% if msg %}
 <script>
    alert("{{msg}}")
    window.location="{% url 'Guest:Sellerregistration' %}"
 </script>
{% endif %}
